<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenRouter provider &mdash; Task 1.2a verification</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #ffffff;
        color: #1a1a1a;
        max-width: 60rem;
        margin: 2rem auto;
        padding: 0 1.25rem;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.5rem;
        margin-top: 0;
      }
      .intro {
        margin-bottom: 1.5rem;
      }
      ol#results {
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          "Liberation Mono", monospace;
        font-size: 0.95rem;
        background: #f6f8fa;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        padding: 1rem 1rem 1rem 2.5rem;
        margin: 1rem 0;
      }
      ol#results li {
        padding: 0.15rem 0;
      }
      .result-pass {
        color: #006100;
      }
      .result-fail {
        color: #b00020;
        font-weight: 600;
      }
      .label {
        font-weight: 700;
        margin-right: 0.4rem;
      }
      #summary {
        font-size: 1.1rem;
        font-weight: 600;
        padding: 0.75rem 1rem;
        border-radius: 6px;
        border: 2px solid #d0d7de;
      }
      #summary.summary-pass {
        color: #006100;
        background: #e8f5e9;
        border-color: #006100;
      }
      #summary.summary-fail {
        color: #b00020;
        background: #fdecea;
        border-color: #b00020;
      }
      #summary.summary-pending {
        color: #1a1a1a;
        background: #f6f8fa;
      }
    </style>
  </head>
  <body>
    <h1>OpenRouter provider &mdash; Task 1.2a verification</h1>
    <p class="intro">
      Open this file in a browser; results below. Each check appears as a
      single line prefixed with either <strong>PASS</strong> or
      <strong>FAIL</strong>. The summary line at the end reports the overall
      result.
    </p>

    <h2>Results</h2>
    <ol id="results" aria-live="polite"></ol>

    <p id="summary" class="summary-pending" role="status" aria-live="polite">
      Running checks&hellip;
    </p>

    <!-- Modules under test (load order matters: registry first, provider second) -->
    <script src="../providers/_interface.js"></script>
    <script src="../providers/openrouter.js"></script>

    <!-- Test runner (inline for portability) -->
    <script>
      (function () {
        "use strict";

        const resultsList = document.getElementById("results");
        const summaryEl = document.getElementById("summary");

        let passCount = 0;
        let failCount = 0;

        function appendResult(passed, description, detail) {
          const li = document.createElement("li");
          li.className = passed ? "result-pass" : "result-fail";

          const labelSpan = document.createElement("span");
          labelSpan.className = "label";
          labelSpan.textContent = passed ? "PASS" : "FAIL";

          const textSpan = document.createElement("span");
          textSpan.textContent =
            "— " + description + (detail ? " (" + detail + ")" : "");

          li.appendChild(labelSpan);
          li.appendChild(textSpan);
          resultsList.appendChild(li);

          if (passed) passCount++;
          else failCount++;
        }

        function check(description, fn) {
          try {
            const ok = !!fn();
            appendResult(ok, description, ok ? "" : "assertion returned falsy");
          } catch (err) {
            appendResult(
              false,
              description,
              "threw: " + (err && err.message ? err.message : String(err))
            );
          }
        }

        function deepEqual(a, b) {
          return JSON.stringify(a) === JSON.stringify(b);
        }

        function hasOwn(obj, key) {
          return Object.prototype.hasOwnProperty.call(obj, key);
        }

        // ------------------------------------------------------------------
        // 1. Registry sees the provider
        // ------------------------------------------------------------------
        check("registry.has('openrouter') === true", function () {
          return window.EmbedProviderRegistry.has("openrouter") === true;
        });
        check("registry.list() includes 'openrouter'", function () {
          return (
            window.EmbedProviderRegistry.list().indexOf("openrouter") !== -1
          );
        });

        // ------------------------------------------------------------------
        // 2. Provider shape conforms to contract
        // ------------------------------------------------------------------
        const provider = window.EmbedProviderRegistry.get("openrouter");

        check("provider.id === 'openrouter'", function () {
          return provider && provider.id === "openrouter";
        });
        check("provider.buildRequest is a function", function () {
          return typeof provider.buildRequest === "function";
        });
        check("provider.endpoint is a function", function () {
          return typeof provider.endpoint === "function";
        });
        check("provider.parseStreamChunk is a function", function () {
          return typeof provider.parseStreamChunk === "function";
        });
        check("provider.parseResponse is a function", function () {
          return typeof provider.parseResponse === "function";
        });
        check("provider.capabilities is an object", function () {
          return (
            provider.capabilities !== null &&
            typeof provider.capabilities === "object" &&
            !Array.isArray(provider.capabilities)
          );
        });

        // ------------------------------------------------------------------
        // 3. Capabilities are all true
        // ------------------------------------------------------------------
        check("capabilities.streaming === true", function () {
          return provider.capabilities.streaming === true;
        });
        check("capabilities.images === true", function () {
          return provider.capabilities.images === true;
        });
        check("capabilities.pdf === true", function () {
          return provider.capabilities.pdf === true;
        });
        check("capabilities.reasoning === true", function () {
          return provider.capabilities.reasoning === true;
        });
        check("capabilities.toolCalls === true", function () {
          return provider.capabilities.toolCalls === true;
        });

        // ------------------------------------------------------------------
        // 4. endpoint() returns expected metadata
        // ------------------------------------------------------------------
        const ep = provider.endpoint("anthropic/claude-3.5-haiku", {});
        check(
          "endpoint().url === 'https://openrouter.ai/api/v1/chat/completions'",
          function () {
            return (
              ep.url === "https://openrouter.ai/api/v1/chat/completions"
            );
          }
        );
        check("endpoint().headers is an object", function () {
          return (
            ep.headers !== null &&
            typeof ep.headers === "object" &&
            !Array.isArray(ep.headers)
          );
        });

        // ------------------------------------------------------------------
        // 5. Pass-through methods
        // ------------------------------------------------------------------
        const stubChunk = { foo: "bar" };
        check(
          "parseStreamChunk(stubChunk) returns the same reference",
          function () {
            return provider.parseStreamChunk(stubChunk) === stubChunk;
          }
        );
        const stubJson = { choices: [{ message: { content: "hi" } }] };
        check("parseResponse(stubJson) returns the same reference", function () {
          return provider.parseResponse(stubJson) === stubJson;
        });

        // ------------------------------------------------------------------
        // 6. buildRequest — minimal canonical input
        // ------------------------------------------------------------------
        const minimalMessages = [{ role: "user", content: "hi" }];
        const minimalOptions = {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
        };
        const minimalBody = provider.buildRequest(
          minimalMessages,
          minimalOptions
        );

        check(
          "minimal: body has model, messages, temperature, max_tokens, top_p with correct values",
          function () {
            return (
              minimalBody.model === "x" &&
              minimalBody.messages === minimalMessages &&
              minimalBody.temperature === 0.7 &&
              minimalBody.max_tokens === 100 &&
              minimalBody.top_p === 1
            );
          }
        );
        check("minimal: 'reasoning' key NOT present", function () {
          return hasOwn(minimalBody, "reasoning") === false;
        });
        check("minimal: 'plugins' key NOT present", function () {
          return hasOwn(minimalBody, "plugins") === false;
        });

        // ------------------------------------------------------------------
        // 7. buildRequest — reasoning enabled, no effort or max_tokens
        // ------------------------------------------------------------------
        const reasoningPlainBody = provider.buildRequest(minimalMessages, {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
          reasoning: { enabled: true },
        });
        check(
          "reasoning plain: body.reasoning === { enabled: true }",
          function () {
            return deepEqual(reasoningPlainBody.reasoning, { enabled: true });
          }
        );

        // ------------------------------------------------------------------
        // 8. buildRequest — reasoning effort
        // ------------------------------------------------------------------
        const reasoningEffortBody = provider.buildRequest(minimalMessages, {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
          reasoning: { enabled: true, effort: "high" },
        });
        check(
          "reasoning effort: body.reasoning === { enabled: true, effort: 'high' }",
          function () {
            return deepEqual(reasoningEffortBody.reasoning, {
              enabled: true,
              effort: "high",
            });
          }
        );

        // ------------------------------------------------------------------
        // 9. buildRequest — reasoning max_tokens (positive)
        // ------------------------------------------------------------------
        const reasoningBudgetBody = provider.buildRequest(minimalMessages, {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
          reasoning: { enabled: true, max_tokens: 5000 },
        });
        check(
          "reasoning budget: body.reasoning === { enabled: true, max_tokens: 5000 }",
          function () {
            return deepEqual(reasoningBudgetBody.reasoning, {
              enabled: true,
              max_tokens: 5000,
            });
          }
        );

        // ------------------------------------------------------------------
        // 10. buildRequest — reasoning enabled:false MUST be omitted entirely
        // ------------------------------------------------------------------
        const reasoningDisabledBody = provider.buildRequest(minimalMessages, {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
          reasoning: { enabled: false },
        });
        check(
          "reasoning disabled: 'reasoning' key NOT present",
          function () {
            return hasOwn(reasoningDisabledBody, "reasoning") === false;
          }
        );

        // ------------------------------------------------------------------
        // 11. buildRequest — reasoning max_tokens 0 should be ignored
        // ------------------------------------------------------------------
        const reasoningZeroBudgetBody = provider.buildRequest(minimalMessages, {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
          reasoning: { enabled: true, max_tokens: 0 },
        });
        check(
          "reasoning zero budget: body.reasoning === { enabled: true } (max_tokens omitted)",
          function () {
            return deepEqual(reasoningZeroBudgetBody.reasoning, {
              enabled: true,
            });
          }
        );

        // ------------------------------------------------------------------
        // 12. buildRequest — fileEngine 'native'
        // ------------------------------------------------------------------
        const nativeEngineBody = provider.buildRequest(minimalMessages, {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
          fileEngine: "native",
        });
        check(
          "fileEngine native: body.plugins === [{ id: 'file-parser', pdf: { engine: 'native' } }]",
          function () {
            return deepEqual(nativeEngineBody.plugins, [
              { id: "file-parser", pdf: { engine: "native" } },
            ]);
          }
        );

        // ------------------------------------------------------------------
        // 13. buildRequest — fileEngine 'auto' MUST be omitted
        // ------------------------------------------------------------------
        const autoEngineBody = provider.buildRequest(minimalMessages, {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
          fileEngine: "auto",
        });
        check("fileEngine auto: 'plugins' key NOT present", function () {
          return hasOwn(autoEngineBody, "plugins") === false;
        });

        // ------------------------------------------------------------------
        // 14. buildRequest — fileEngine missing
        // ------------------------------------------------------------------
        const noEngineBody = provider.buildRequest(minimalMessages, {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
        });
        check("fileEngine missing: 'plugins' key NOT present", function () {
          return hasOwn(noEngineBody, "plugins") === false;
        });

        // ------------------------------------------------------------------
        // 15. buildRequest — both reasoning and PDF plugins together
        // ------------------------------------------------------------------
        const bothBody = provider.buildRequest(minimalMessages, {
          model: "x",
          temperature: 0.7,
          max_tokens: 100,
          top_p: 1,
          reasoning: { enabled: true, effort: "medium" },
          fileEngine: "mistral-ocr",
        });
        check(
          "both: body.reasoning === { enabled: true, effort: 'medium' }",
          function () {
            return deepEqual(bothBody.reasoning, {
              enabled: true,
              effort: "medium",
            });
          }
        );
        check(
          "both: body.plugins === [{ id: 'file-parser', pdf: { engine: 'mistral-ocr' } }]",
          function () {
            return deepEqual(bothBody.plugins, [
              { id: "file-parser", pdf: { engine: "mistral-ocr" } },
            ]);
          }
        );

        // ------------------------------------------------------------------
        // Summary
        // ------------------------------------------------------------------
        const total = passCount + failCount;
        if (failCount === 0) {
          summaryEl.className = "summary-pass";
          summaryEl.textContent = "All " + total + " checks passed.";
        } else {
          summaryEl.className = "summary-fail";
          summaryEl.textContent =
            failCount + " of " + total + " checks failed.";
        }
      })();
    </script>
  </body>
</html>
